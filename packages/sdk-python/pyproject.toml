[project]
name = "wayforth-sdk"
version = "0.1.2"
description = "Python SDK for Wayforth — search engine and payment rail for AI agents"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.10"
dependencies = ["httpx>=0.27"]
keywords = ["ai", "agents", "mcp", "wayforth", "api"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
]

[project.urls]
Homepage = "https://wayforth.io"
Repository = "https://github.com/WayforthOfficial/wayforth"
Documentation = "https://api-production-fd71.up.railway.app/docs"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["wayforth"]
