[project]
name = "wayforth-sdk"
version = "0.1.0"
description = "Python SDK for Wayforth — discover and call AI services"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "httpx>=0.28.1",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["wayforth"]
