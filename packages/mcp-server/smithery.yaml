startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      apiKey:
        type: string
        description: "Your Wayforth API key — get one free at wayforth.io/signup"
    required:
      - apiKey
  commandFunction: |-
    (config) => ({
      command: "uvx",
      args: ["wayforth-mcp"],
      env: {
        WAYFORTH_API_KEY: config.apiKey
      }
    })
