[project]
name = "wayforth-mcp"
version = "0.7.6"
description = "MCP server for Wayforth — The API Runtime for AI Agents."
readme = "README.md"
license = {text = "MIT"}
authors = [{name = "Wayforth Technologies Inc."}]
requires-python = ">=3.10"
dependencies = [
    "mcp>=1.0.0",
    "httpx>=0.27",
    "python-dotenv>=1.0",
    "uvicorn>=0.30",
]
keywords = ["ai", "agents", "mcp", "wayforth", "api"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
]

[project.scripts]
wayforth-mcp = "server:main"

[project.urls]
Homepage = "https://wayforth.io"
Repository = "https://github.com/WayforthOfficial/wayforth"
Documentation = "https://gateway.wayforth.io/docs"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
include = ["server.py"]

[tool.mcp]
name = "io.github.WayforthOfficial/wayforth"
