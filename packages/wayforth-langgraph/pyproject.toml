[project]
name = "wayforth-langgraph"
version = "0.9.0"
description = "LangGraph drop-in adapter for Wayforth — one import, one init, execution via proxy"
readme = "README.md"
license = {text = "BSL-1.1"}
authors = [{name = "Wayforth Technologies Inc."}]
requires-python = ">=3.10"
dependencies = [
    "httpx>=0.27",
    "langchain-core>=0.3",
]
keywords = ["wayforth", "langgraph", "langchain", "ai", "agents", "tools"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: Other/Proprietary License",
    "Programming Language :: Python :: 3",
]

[project.urls]
Homepage = "https://wayforth.io"
Repository = "https://github.com/WayforthOfficial/wayforth"
Documentation = "https://wayforth.io/guide/"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["wayforth_langgraph"]
