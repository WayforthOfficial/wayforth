startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      WAYFORTH_API_KEY:
        type: string
        description: "Your Wayforth API key — get one free at wayforth.io"
    required:
      - WAYFORTH_API_KEY
  commandFunction: |-
    (config) => ({
      command: "uvx",
      args: ["wayforth-mcp"],
      env: {
        WAYFORTH_API_KEY: config.WAYFORTH_API_KEY
      }
    })
