<!DOCTYPE html><html><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<style>
  body{margin:0;padding:0;background:#0a0f1a;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,sans-serif}
  .wrap{background:#0a0f1a;padding:40px 0}
  .email{max-width:580px;margin:0 auto;border-radius:16px;overflow:hidden;border:1px solid rgba(255,255,255,.08)}
  .hd{background:#07090f;background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);background-size:40px 40px;padding:36px 48px 32px;text-align:center}
  .logo-wrap{display:inline-flex;align-items:center;gap:10px;margin-bottom:14px}
  .logo-pill{background:#fff;border-radius:8px;padding:6px 8px;display:inline-flex;align-items:center;justify-content:center}
  .logo-pill img{height:22px;display:block}
  .logo-name{font-size:18px;font-weight:700;color:#fff;letter-spacing:-.3px}
  .tagline{font-size:11px;color:rgba(255,255,255,.28);letter-spacing:.2em;text-transform:uppercase;font-family:monospace}
  .bd{background:#0d1117;padding:44px 48px 36px}
  .label{font-size:11px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;font-family:monospace;margin-bottom:14px}
  .h1{font-size:30px;font-weight:700;color:#fff;letter-spacing:-.6px;line-height:1.15;margin:0 0 18px}
  .body-text{font-size:15px;color:rgba(255,255,255,.5);line-height:1.75;margin:0 0 28px}
  .stat-row{display:flex;gap:12px;margin-bottom:28px}
  .stat-box{flex:1;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:18px 20px}
  .stat-label{font-size:10px;color:rgba(255,255,255,.28);letter-spacing:.14em;text-transform:uppercase;font-family:monospace;margin-bottom:6px}
  .stat-val{font-size:26px;font-weight:700;color:#fff;letter-spacing:-.5px}
  .cta-wrap{text-align:center;margin-bottom:36px}
  .cta{display:inline-block;background:#00D4B8;color:#07090f;font-weight:700;font-size:14px;text-decoration:none;padding:14px 36px;border-radius:8px;letter-spacing:-.1px}
  .ft{background:#07090f;border-top:1px solid rgba(255,255,255,.07);padding:24px 48px;text-align:center}
  .ft p{margin:0;font-size:12px;color:rgba(255,255,255,.2);line-height:1.8;font-family:monospace}
  .ft a{color:#00D4B8;text-decoration:none}
  .ft .dim{color:rgba(255,255,255,.12)}
</style>
</head>
<body><div class="wrap"><table class="email" width="580" cellpadding="0" cellspacing="0">
<tr><td class="hd">
  <div class="logo-wrap">
    <div class="logo-pill"><img src="https://wayforth.io/wayforth-logo.png" alt=""></div>
    <span class="logo-name">Wayforth</span>
  </div><br>
  <span class="tagline">The API Runtime for AI Agents</span>
</td></tr>
<tr><td class="bd">
  <div class="label" style="color:#00D4B8">Payment confirmed</div>
  <div class="h1">Wayforth {{plan_name}}<br>is active.</div>
  <div class="stat-row">
    <div class="stat-box"><div class="stat-label">Credits added</div><div class="stat-val">{{credits_added}}</div></div>
    <div class="stat-box"><div class="stat-label">Amount charged</div><div class="stat-val">{{amount}}</div></div>
  </div>
  <div class="body-text" style="margin-bottom:32px">Next renewal: <strong style="color:rgba(255,255,255,.7)">{{renewal_date}}</strong></div>
  <div class="cta-wrap"><a class="cta" href="https://wayforth.io/dashboard">View dashboard →</a></div>
</td></tr>
<tr><td class="ft"><p>
<a href="https://wayforth.io">wayforth.io</a>
<span class="dim">&nbsp;&middot;&nbsp;</span>
<a href="https://wayforth.io/privacy" style="color:rgba(255,255,255,.25)">Privacy</a>
<span class="dim">&nbsp;&middot;&nbsp;</span>
<a href="https://wayforth.io/terms" style="color:rgba(255,255,255,.25)">Terms</a>
</p></td></tr>
</table></div></body></html>
