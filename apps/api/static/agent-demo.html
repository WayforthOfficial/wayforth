<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Wayforth Agent Demo — Talk to the Catalog</title>
  <style>
    /* Dark theme matching demo.html */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0F172A; color: #E2E8F0; min-height: 100vh; padding: 32px 24px; }
    .container { max-width: 700px; margin: 0 auto; }
    .logo { font-size: 20px; font-weight: 800; color: #4F46E5; margin-bottom: 4px; }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
    .subtitle { color: #64748B; font-size: 14px; margin-bottom: 24px; }
    .chat-window { background: #1E293B; border: 1px solid #334155; border-radius: 12px; min-height: 400px; max-height: 500px; overflow-y: auto; padding: 20px; margin-bottom: 16px; display: flex; flex-direction: column; gap: 12px; }
    .message { max-width: 85%; }
    .message.user { align-self: flex-end; background: #4F46E5; color: white; padding: 10px 14px; border-radius: 12px 12px 4px 12px; font-size: 14px; }
    .message.assistant { align-self: flex-start; background: #0F172A; border: 1px solid #334155; padding: 12px 16px; border-radius: 12px 12px 12px 4px; font-size: 14px; line-height: 1.5; }
    .message.loading { color: #64748B; font-style: italic; }
    .service-card { background: #1E293B; border: 1px solid #334155; border-radius: 8px; padding: 12px; margin: 8px 0; }
    .service-card .name { font-weight: 700; color: #E2E8F0; }
    .service-card .score { color: #4F46E5; font-weight: 700; font-size: 12px; }
    .service-card .reason { color: #94A3B8; font-size: 12px; margin-top: 4px; }
    .service-card .meta { color: #64748B; font-size: 11px; margin-top: 4px; }
    .input-row { display: flex; gap: 10px; }
    input { flex: 1; background: #1E293B; border: 1px solid #334155; color: #E2E8F0; border-radius: 8px; padding: 12px 16px; font-size: 14px; outline: none; }
    input:focus { border-color: #4F46E5; }
    button { background: #4F46E5; color: white; border: none; border-radius: 8px; padding: 12px 20px; font-weight: 600; cursor: pointer; font-size: 14px; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .suggestions { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
    .chip { background: #1E293B; border: 1px solid #334155; border-radius: 20px; padding: 5px 12px; font-size: 12px; cursor: pointer; color: #94A3B8; }
    .chip:hover { border-color: #4F46E5; color: #E2E8F0; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">Wayforth</div>
    <h1>Ask the Catalog</h1>
    <p class="subtitle">Describe what your agent needs. Wayforth finds and ranks the best services.</p>

    <div class="suggestions">
      <div class="chip" onclick="ask('Find me the fastest inference API for coding agents')">Fast inference for coding</div>
      <div class="chip" onclick="ask('I need to translate text to Spanish professionally')">Translate to Spanish</div>
      <div class="chip" onclick="ask('What are the best real-time stock data services?')">Real-time stock data</div>
      <div class="chip" onclick="ask('Find web search APIs for AI agents')">Web search for agents</div>
    </div>

    <div class="chat-window" id="chat"></div>

    <div class="input-row">
      <input id="input" placeholder="Describe what your agent needs..." onkeydown="if(event.key==='Enter')sendMessage()">
      <button id="btn" onclick="sendMessage()">Ask</button>
    </div>
  </div>

  <script>
    const WAYFORTH_API = 'https://gateway.wayforth.io';
    const chat = document.getElementById('chat');

    // Initial greeting
    addMessage('assistant', 'Hello! I can help you find agent-payable services in the Wayforth catalog. What does your agent need? Try asking for "fast inference", "translation", "stock data", or anything else.');

    function addMessage(role, content, isHtml = false) {
      const div = document.createElement('div');
      div.className = `message ${role}`;
      if (isHtml) div.innerHTML = content;
      else div.textContent = content;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
      return div;
    }

    async function sendMessage() {
      const input = document.getElementById('input');
      const btn = document.getElementById('btn');
      const q = input.value.trim();
      if (!q) return;

      input.value = '';
      btn.disabled = true;
      addMessage('user', q);

      const loading = addMessage('assistant', 'Searching the catalog...', false);
      loading.classList.add('loading');

      try {
        // Call Wayforth search directly
        const res = await fetch(`${WAYFORTH_API}/search?q=${encodeURIComponent(q)}&limit=4`);
        const data = await res.json();

        loading.remove();

        if (!data.results?.length) {
          addMessage('assistant', 'No matching services found for that query. Try different terms like "inference", "translation", or "data".');
          return;
        }

        const topResult = data.results[0];
        let html = `<div>Found <strong>${data.results.length} services</strong> for "${q}":</div>`;

        data.results.forEach(s => {
          const protocol = s.payment_protocol === 'x402' ? ' · <span style="color:#10B981">x402</span>' : '';
          html += `
            <div class="service-card">
              <div style="display:flex;justify-content:space-between;align-items:center">
                <span class="name">${s.name}</span>
                <span class="score">Score: ${s.score}</span>
              </div>
              <div class="reason">${s.reason}</div>
              <div class="meta">Tier ${s.coverage_tier} · ${s.category} · ${s.pricing_usdc ? '$'+s.pricing_usdc+' USDC/req' : 'Free'}${protocol}</div>
            </div>`;
        });

        html += `<div style="color:#64748B;font-size:12px;margin-top:8px">
          To pay for <strong>${topResult.name}</strong>, call <code style="color:#4F46E5">wayforth_pay("${(topResult.service_id||'').slice(0,16)}...", owner, amount)</code>
        </div>`;

        addMessage('assistant', html, true);
      } catch(e) {
        loading.remove();
        addMessage('assistant', `Error: ${e.message}`);
      } finally {
        btn.disabled = false;
      }
    }

    function ask(q) {
      document.getElementById('input').value = q;
      sendMessage();
    }
  </script>
</body>
</html>
