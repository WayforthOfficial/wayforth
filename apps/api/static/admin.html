<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wayforth Admin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
    }

    header {
      background: #1e293b;
      border-bottom: 1px solid #334155;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 { font-size: 18px; font-weight: 600; letter-spacing: 0.02em; }
    .env-badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 99px;
      background: #4F46E5;
      color: #fff;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    #auth-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 80vh;
      gap: 16px;
    }
    #auth-screen h2 { font-size: 22px; font-weight: 600; }
    #auth-screen p { color: #94a3b8; font-size: 14px; }
    .key-form { display: flex; gap: 8px; margin-top: 8px; }
    .key-form input {
      background: #1e293b;
      border: 1px solid #334155;
      color: #e2e8f0;
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 14px;
      width: 280px;
      outline: none;
    }
    .key-form input:focus { border-color: #4F46E5; }
    .btn {
      background: #4F46E5;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn:hover { background: #4338CA; }
    .error-msg { color: #f87171; font-size: 13px; }

    #dashboard { display: none; padding: 32px; max-width: 1400px; margin: 0 auto; }

    .section-title {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #64748b;
      margin-bottom: 12px;
      margin-top: 32px;
    }
    .section-title:first-of-type { margin-top: 0; }

    .grid { display: grid; gap: 16px; }
    .grid-4 { grid-template-columns: repeat(4, 1fr); }
    .grid-3 { grid-template-columns: repeat(3, 1fr); }
    .grid-2 { grid-template-columns: repeat(2, 1fr); }
    @media (max-width: 900px) {
      .grid-4, .grid-3, .grid-2 { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 560px) {
      .grid-4, .grid-3, .grid-2 { grid-template-columns: 1fr; }
    }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 20px 24px;
    }
    .card-label { font-size: 12px; color: #64748b; font-weight: 500; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
    .card-value { font-size: 36px; font-weight: 700; color: #f1f5f9; }
    .card-sub { font-size: 13px; color: #94a3b8; margin-top: 4px; }

    .tier-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
    .tier-chip {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 12px 8px;
      text-align: center;
    }
    .tier-chip .t-label { font-size: 11px; color: #64748b; font-weight: 600; text-transform: uppercase; }
    .tier-chip .t-val { font-size: 24px; font-weight: 700; color: #a5b4fc; margin-top: 2px; }

    .cat-grid { display: flex; flex-direction: column; gap: 8px; margin-top: 4px; }
    .cat-row { display: flex; align-items: center; gap: 10px; }
    .cat-bar-wrap { flex: 1; background: #0f172a; border-radius: 4px; height: 8px; overflow: hidden; }
    .cat-bar { height: 100%; background: #4F46E5; border-radius: 4px; transition: width 0.4s; }
    .cat-name { font-size: 13px; color: #94a3b8; min-width: 90px; }
    .cat-count { font-size: 13px; color: #e2e8f0; font-weight: 600; min-width: 32px; text-align: right; }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { text-align: left; padding: 8px 12px; color: #64748b; font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid #334155; }
    td { padding: 10px 12px; border-bottom: 1px solid #1e293b; color: #cbd5e1; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #1e293b; }

    .pill {
      display: inline-block;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 99px;
      font-weight: 600;
    }
    .pill-green { background: #064e3b; color: #6ee7b7; }
    .pill-red   { background: #450a0a; color: #fca5a5; }
    .pill-gray  { background: #1e293b; color: #94a3b8; border: 1px solid #334155; }
    .pill-blue  { background: #1e1b4b; color: #a5b4fc; }

    .status-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #334155; }
    .status-row:last-child { border-bottom: none; }
    .status-label { font-size: 13px; color: #94a3b8; }

    .links-grid { display: flex; flex-wrap: wrap; gap: 8px; }
    .quick-link {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 13px;
      color: #a5b4fc;
      text-decoration: none;
      font-weight: 500;
    }
    .quick-link:hover { border-color: #4F46E5; color: #c7d2fe; }

    .addr { font-size: 12px; color: #64748b; font-family: monospace; }
    .addr a { color: #818cf8; text-decoration: none; }
    .addr a:hover { color: #a5b4fc; text-decoration: underline; }

    .spinner {
      display: inline-block;
      width: 18px; height: 18px;
      border: 2px solid #334155;
      border-top-color: #4F46E5;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-msg { text-align: center; padding: 60px; color: #64748b; font-size: 15px; }
  </style>
</head>
<body>

<header>
  <h1>Wayforth Admin</h1>
  <span class="env-badge" id="env-label">loading</span>
</header>

<div id="auth-screen">
  <h2>Admin Access</h2>
  <p>Enter your admin key to view the dashboard.</p>
  <div class="key-form">
    <input type="password" id="key-input" placeholder="ADMIN_KEY" autocomplete="off" />
    <button class="btn" onclick="submitKey()">Enter</button>
  </div>
  <div class="error-msg" id="auth-error"></div>
</div>

<div id="dashboard">
  <div class="loading-msg" id="loading"><span class="spinner"></span>Loading catalog stats…</div>
  <div id="content" style="display:none"></div>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  let adminKey = params.get('key') || '';

  if (adminKey) {
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    loadDashboard(adminKey);
  }

  document.getElementById('key-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') submitKey();
  });

  function submitKey() {
    const k = document.getElementById('key-input').value.trim();
    if (!k) return;
    const url = new URL(window.location.href);
    url.searchParams.set('key', k);
    window.location.href = url.toString();
  }

  async function loadDashboard(key) {
    const res = await fetch(`/admin/stats?key=${encodeURIComponent(key)}`);
    if (res.status === 401) {
      document.getElementById('dashboard').style.display = 'none';
      document.getElementById('auth-screen').style.display = 'flex';
      document.getElementById('auth-error').textContent = 'Invalid admin key.';
      return;
    }
    const d = await res.json();
    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'block';
    render(d, key);
  }

  function tier_color(t) {
    return ['#64748b','#6ee7b7','#60a5fa','#a78bfa'][t] || '#64748b';
  }

  function fmt_date(iso) {
    if (!iso) return '—';
    return iso.replace('T', ' ').slice(0, 19) + ' UTC';
  }

  function render(d, key) {
    const env = d.infrastructure?.api === 'healthy' ? 'production' : 'unknown';
    document.getElementById('env-label').textContent = env;

    const totalCat = Object.values(d.services.by_category).reduce((a,b) => a+b, 0) || 1;

    const catRows = Object.entries(d.services.by_category).map(([cat, cnt]) => `
      <div class="cat-row">
        <span class="cat-name">${cat}</span>
        <div class="cat-bar-wrap"><div class="cat-bar" style="width:${Math.round(cnt/totalCat*100)}%"></div></div>
        <span class="cat-count">${cnt}</span>
      </div>
    `).join('');

    const topRows = d.queries.top_services.map((s,i) => `
      <tr>
        <td>${i+1}</td>
        <td>${s.name}</td>
        <td>${s.query_count}</td>
        <td>${s.avg_score ?? '—'}</td>
        <td><span class="pill pill-blue">${s.category}</span></td>
        <td><span class="pill" style="background:#1e293b;color:#a5b4fc;border:1px solid #334155">Tier ${s.coverage_tier}</span></td>
      </tr>
    `).join('') || `<tr><td colspan="6" style="color:#64748b;text-align:center;padding:20px">No search queries yet</td></tr>`;

    const subRows = d.submissions.recent.map(s => `
      <tr>
        <td>${s.service_name}</td>
        <td>${s.contact_email || '—'}</td>
        <td>${fmt_date(s.submitted_at)}</td>
        <td class="addr">${s.ip_address || '—'}</td>
      </tr>
    `).join('') || `<tr><td colspan="4" style="color:#64748b;text-align:center;padding:20px">No submissions yet</td></tr>`;

    const infra = d.infrastructure;
    const statusPill = v => v === 'healthy' || v === 'connected'
      ? `<span class="pill pill-green">${v}</span>`
      : `<span class="pill pill-red">${v}</span>`;

    document.getElementById('content').innerHTML = `
      <p class="section-title">Services</p>
      <div class="grid grid-3" style="grid-template-columns:auto 1fr 1fr">
        <div class="card">
          <div class="card-label">Total Services</div>
          <div class="card-value">${d.services.total.toLocaleString()}</div>
          <div class="card-sub">in catalog</div>
        </div>
        <div class="card">
          <div class="card-label">By Tier</div>
          <div class="tier-grid" style="margin-top:8px">
            ${[0,1,2,3].map(t => `
              <div class="tier-chip">
                <div class="t-label">Tier ${t}</div>
                <div class="t-val" style="color:${tier_color(t)}">${d.services.by_tier[t] ?? 0}</div>
              </div>`).join('')}
          </div>
        </div>
        <div class="card">
          <div class="card-label">By Category</div>
          <div class="cat-grid">${catRows}</div>
        </div>
      </div>

      <p class="section-title">Query Volume</p>
      <div class="grid grid-4">
        <div class="card">
          <div class="card-label">Today</div>
          <div class="card-value">${d.queries.today}</div>
          <div class="card-sub">searches (24h)</div>
        </div>
        <div class="card">
          <div class="card-label">This Week</div>
          <div class="card-value">${d.queries.week}</div>
          <div class="card-sub">searches (7d)</div>
        </div>
        <div class="card" style="grid-column:span 2">
          <div class="card-label">Submissions</div>
          <div class="card-value">${d.submissions.total}</div>
          <div class="card-sub">total service submissions</div>
        </div>
      </div>

      <p class="section-title">Top Searched Services (7d)</p>
      <div class="card" style="padding:0;overflow:hidden">
        <table>
          <thead><tr>
            <th>#</th><th>Service</th><th>Queries</th><th>Avg Score</th><th>Category</th><th>Tier</th>
          </tr></thead>
          <tbody>${topRows}</tbody>
        </table>
      </div>

      <p class="section-title">Recent Submissions <span style="font-weight:400;color:#64748b;text-transform:none;letter-spacing:0">— Test submissions will be cleaned before launch</span></p>
      <div class="card" style="padding:0;overflow:hidden">
        <table>
          <thead><tr>
            <th>Service</th><th>Contact Email</th><th>Submitted At</th><th>IP</th>
          </tr></thead>
          <tbody>${subRows}</tbody>
        </table>
      </div>

      <p class="section-title">Infrastructure</p>
      <div class="grid grid-2">
        <div class="card">
          <div class="card-label" style="margin-bottom:12px">Status</div>
          <div class="status-row"><span class="status-label">API</span>${statusPill(infra.api)}</div>
          <div class="status-row"><span class="status-label">Database</span>${statusPill(infra.db)}</div>
          <div class="status-row"><span class="status-label">Sentry</span>${statusPill(infra.sentry)}</div>
        </div>
        <div class="card">
          <div class="card-label" style="margin-bottom:12px">Contracts (Base Sepolia)</div>
          <div class="status-row">
            <span class="status-label">Registry</span>
            <span class="addr"><a href="https://sepolia.basescan.org/address/${infra.contracts.registry}" target="_blank">${infra.contracts.registry.slice(0,10)}…</a></span>
          </div>
          <div class="status-row">
            <span class="status-label">Escrow</span>
            <span class="addr"><a href="https://sepolia.basescan.org/address/${infra.contracts.escrow}" target="_blank">${infra.contracts.escrow.slice(0,10)}…</a></span>
          </div>
          <div class="status-row">
            <span class="status-label">USDC</span>
            <span class="addr">0x036CbD53842c5426634e7929541eC2318f3dCF7e</span>
          </div>
        </div>
      </div>

      <p class="section-title">Quick Links</p>
      <div class="card">
        <div class="links-grid">
          <a class="quick-link" href="/docs" target="_blank">API Docs</a>
          <a class="quick-link" href="/stats" target="_blank">/stats</a>
          <a class="quick-link" href="/leaderboard" target="_blank">/leaderboard</a>
          <a class="quick-link" href="/demo" target="_blank">Demo</a>
          <a class="quick-link" href="/admin/stats?key=${encodeURIComponent(key)}" target="_blank">Raw JSON Stats</a>
          <a class="quick-link" href="https://railway.app/dashboard" target="_blank">Railway Dashboard</a>
          <a class="quick-link" href="https://sepolia.basescan.org/address/${infra.contracts.registry}" target="_blank">Basescan Registry</a>
          <a class="quick-link" href="https://sepolia.basescan.org/address/${infra.contracts.escrow}" target="_blank">Basescan Escrow</a>
          <a class="quick-link" href="https://sentry.io" target="_blank">Sentry</a>
        </div>
      </div>
    `;
  }
</script>

</body>
</html>
