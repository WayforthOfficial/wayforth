<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wayforth Service Health</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0f172a; color: #e2e8f0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; min-height: 100vh; }
  .container { max-width: 1100px; margin: 0 auto; padding: 40px 24px; }
  header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; flex-wrap: wrap; gap: 12px; }
  .logo { font-size: 22px; font-weight: 700; color: #4F46E5; }
  .title { font-size: 18px; font-weight: 600; color: #e2e8f0; }
  .last-checked { font-size: 13px; color: #64748b; }
  .summary { display: flex; gap: 16px; margin-bottom: 28px; flex-wrap: wrap; }
  .badge { display: inline-flex; align-items: center; gap: 8px; padding: 10px 18px; border-radius: 8px; font-weight: 600; font-size: 14px; }
  .badge-green { background: #052e16; border: 1px solid #16a34a; color: #4ade80; }
  .badge-yellow { background: #1c1504; border: 1px solid #ca8a04; color: #fbbf24; }
  .badge-red { background: #1c0505; border: 1px solid #dc2626; color: #f87171; }
  .stat { background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 16px 20px; min-width: 140px; }
  .stat-label { font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
  .stat-value { font-size: 28px; font-weight: 700; color: #e2e8f0; }
  .card { background: #1e293b; border: 1px solid #334155; border-radius: 10px; overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  th { background: #0f172a; color: #64748b; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; padding: 12px 16px; text-align: left; font-weight: 500; }
  td { padding: 14px 16px; font-size: 14px; border-top: 1px solid #1e293b; }
  tr:hover td { background: #1e293b; }
  tr:first-child td { border-top: none; }
  .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 8px; }
  .dot-green { background: #22c55e; box-shadow: 0 0 6px #22c55e66; }
  .dot-yellow { background: #eab308; box-shadow: 0 0 6px #eab30866; }
  .dot-red { background: #ef4444; box-shadow: 0 0 6px #ef444466; }
  .status-up { color: #4ade80; font-weight: 500; }
  .status-degraded { color: #fbbf24; font-weight: 500; }
  .status-down { color: #f87171; font-weight: 500; }
  .tier-chip { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; background: #1e3a5f; color: #60a5fa; border: 1px solid #1d4ed8; }
  .mono { font-family: monospace; font-size: 12px; color: #94a3b8; }
  footer { margin-top: 32px; display: flex; align-items: center; justify-content: space-between; font-size: 12px; color: #475569; flex-wrap: wrap; gap: 8px; }
  .refresh-bar { background: #1e293b; border-radius: 6px; height: 4px; width: 120px; overflow: hidden; }
  .refresh-fill { height: 100%; background: #4F46E5; transition: width 1s linear; }
  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #334155; border-top-color: #4F46E5; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading { text-align: center; padding: 60px; color: #64748b; }
  a { color: #818cf8; text-decoration: none; }
  a:hover { color: #a5b4fc; }
</style>
</head>
<body>
<div class="container">
  <header>
    <div>
      <div class="logo">Wayforth</div>
      <div class="title">Service Health</div>
    </div>
    <div style="text-align:right">
      <div id="overall-badge" class="badge badge-green" style="margin-bottom:8px">
        <span id="badge-dot" class="dot dot-green"></span>
        <span id="badge-text">Loading…</span>
      </div>
      <div class="last-checked">Last checked: <span id="last-checked">—</span></div>
    </div>
  </header>

  <div class="summary" id="summary">
    <div class="stat">
      <div class="stat-label">Tier 2 Services</div>
      <div class="stat-value" id="total-count">—</div>
    </div>
    <div class="stat">
      <div class="stat-label">Operational</div>
      <div class="stat-value" id="up-count" style="color:#4ade80">—</div>
    </div>
    <div class="stat">
      <div class="stat-label">Degraded</div>
      <div class="stat-value" id="degraded-count" style="color:#fbbf24">—</div>
    </div>
  </div>

  <div class="card">
    <div id="table-wrap">
      <div class="loading"><span class="spinner"></span> Fetching health data…</div>
    </div>
  </div>

  <footer>
    <div><a href="https://wayforth.io">wayforth.io</a> · API v0.1.5</div>
    <div style="display:flex;align-items:center;gap:10px">
      <span id="countdown-label">Refreshing in <strong id="countdown">60</strong>s</span>
      <div class="refresh-bar"><div class="refresh-fill" id="refresh-fill" style="width:100%"></div></div>
    </div>
  </footer>
</div>

<script>
const API = '/health-report';
let countdown = 60;
let timer;

function statusClass(svc) {
  const f = svc.consecutive_failures || 0;
  if (f === 0) return 'up';
  if (f < 3) return 'degraded';
  return 'down';
}

function dotClass(st) {
  return st === 'up' ? 'dot-green' : st === 'degraded' ? 'dot-yellow' : 'dot-red';
}

function formatTime(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleString(undefined, { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
}

function render(data) {
  const services = data.tier2_services || [];
  const upCount = services.filter(s => (s.consecutive_failures || 0) === 0).length;
  const degradedCount = services.length - upCount;

  document.getElementById('total-count').textContent = services.length;
  document.getElementById('up-count').textContent = upCount;
  document.getElementById('degraded-count').textContent = degradedCount;
  document.getElementById('last-checked').textContent = new Date().toLocaleTimeString();

  const badge = document.getElementById('overall-badge');
  const bdot = document.getElementById('badge-dot');
  const btext = document.getElementById('badge-text');
  badge.className = 'badge ' + (data.all_healthy ? 'badge-green' : degradedCount === services.length ? 'badge-red' : 'badge-yellow');
  bdot.className = 'dot ' + (data.all_healthy ? 'dot-green' : degradedCount === services.length ? 'dot-red' : 'dot-yellow');
  btext.textContent = data.all_healthy ? 'All Operational' : degradedCount === services.length ? 'Major Issues' : 'Degraded';

  if (services.length === 0) {
    document.getElementById('table-wrap').innerHTML = '<div class="loading" style="padding:40px;color:#64748b">No Tier 2 services found.</div>';
    return;
  }

  const rows = services.map(s => {
    const st = statusClass(s);
    const dc = dotClass(st);
    const stLabel = st === 'up' ? '<span class="status-up">Operational</span>' : st === 'degraded' ? '<span class="status-degraded">Degraded</span>' : '<span class="status-down">Failing</span>';
    return `<tr>
      <td><span class="dot ${dc}"></span>${s.name}</td>
      <td><span class="tier-chip">Tier 2</span></td>
      <td>${stLabel}</td>
      <td class="mono">${s.consecutive_failures || 0} / 3</td>
      <td class="mono">${formatTime(s.last_checked)}</td>
    </tr>`;
  }).join('');

  document.getElementById('table-wrap').innerHTML = `
    <table>
      <thead><tr>
        <th>Service</th><th>Tier</th><th>Status</th><th>Failures</th><th>Last Tested</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

async function load() {
  try {
    const res = await fetch(API);
    if (!res.ok) throw new Error(res.status);
    const data = await res.json();
    render(data);
  } catch (e) {
    document.getElementById('table-wrap').innerHTML = `<div class="loading" style="color:#f87171">Failed to load health data: ${e.message}</div>`;
  }
}

function startCountdown() {
  clearInterval(timer);
  countdown = 60;
  document.getElementById('countdown').textContent = countdown;
  document.getElementById('refresh-fill').style.width = '100%';

  timer = setInterval(() => {
    countdown--;
    document.getElementById('countdown').textContent = Math.max(0, countdown);
    document.getElementById('refresh-fill').style.width = (countdown / 60 * 100) + '%';
    if (countdown <= 0) {
      clearInterval(timer);
      load().then(startCountdown);
    }
  }, 1000);
}

load().then(startCountdown);
</script>
</body>
</html>
