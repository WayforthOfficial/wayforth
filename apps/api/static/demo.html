<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wayforth — Live Demo</title>
  <style>
    /* Clean, minimal, dark theme matching wayforth.io */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0F172A; color: #E2E8F0; min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      padding: 48px 24px;
    }
    .logo { font-size: 28px; font-weight: 800; color: #4F46E5; margin-bottom: 8px; }
    .tagline { color: #64748B; margin-bottom: 40px; font-size: 15px; }
    .search-box {
      width: 100%; max-width: 640px;
      display: flex; gap: 12px; margin-bottom: 32px;
    }
    input {
      flex: 1; padding: 14px 18px; border-radius: 10px;
      border: 1px solid #1E293B; background: #1E293B;
      color: #E2E8F0; font-size: 15px; outline: none;
    }
    input:focus { border-color: #4F46E5; }
    button {
      padding: 14px 24px; background: #4F46E5; color: white;
      border: none; border-radius: 10px; cursor: pointer;
      font-size: 15px; font-weight: 600;
    }
    button:hover { background: #4338CA; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .results { width: 100%; max-width: 640px; }
    .result-card {
      background: #1E293B; border: 1px solid #334155;
      border-radius: 12px; padding: 20px; margin-bottom: 12px;
    }
    .result-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .result-name { font-weight: 700; font-size: 16px; }
    .result-score { background: #4F46E5; color: white; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
    .result-reason { color: #94A3B8; font-size: 14px; margin-bottom: 10px; line-height: 1.5; }
    .result-meta { display: flex; gap: 12px; font-size: 12px; color: #64748B; }
    .tier-badge {
      padding: 2px 8px; border-radius: 4px; font-weight: 600;
    }
    .tier-0 { background: #1E293B; color: #94A3B8; border: 1px solid #334155; }
    .tier-2 { background: #064E3B; color: #6EE7B7; border: 1px solid #059669; }
    .result-endpoint { color: #4F46E5; font-size: 12px; text-decoration: none; }
    .result-endpoint:hover { text-decoration: underline; }
    .stats-bar {
      color: #64748B; font-size: 13px; margin-bottom: 24px;
      text-align: center;
    }
    .stats-bar span { color: #4F46E5; font-weight: 600; }
    .loading { color: #64748B; text-align: center; padding: 40px; }
    .error { color: #F87171; text-align: center; padding: 20px; }
    .suggestions { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 32px; }
    .suggestion {
      padding: 6px 14px; background: #1E293B; border: 1px solid #334155;
      border-radius: 20px; font-size: 13px; cursor: pointer; color: #94A3B8;
    }
    .suggestion:hover { border-color: #4F46E5; color: #E2E8F0; }
  </style>
</head>
<body>
  <div class="logo">Wayforth</div>
  <div class="tagline">The search engine for AI agents — live demo</div>

  <div class="search-box">
    <input type="text" id="query" placeholder="translate text to Spanish..."
           onkeydown="if(event.key==='Enter') search()">
    <button onclick="search()" id="btn">Search</button>
  </div>

  <div class="suggestions">
    <div class="suggestion" onclick="searchFor('fast inference for coding')">fast inference for coding</div>
    <div class="suggestion" onclick="searchFor('translate English to Spanish')">translate to Spanish</div>
    <div class="suggestion" onclick="searchFor('real-time stock prices')">real-time stock prices</div>
    <div class="suggestion" onclick="searchFor('web search for agents')">web search for agents</div>
  </div>

  <div class="stats-bar" id="stats">Loading catalog stats...</div>
  <div class="results" id="results"></div>

  <script>
    const API = 'https://api-production-fd71.up.railway.app';

    async function loadStats() {
      try {
        const [statsRes, lbRes] = await Promise.all([
          fetch(`${API}/stats`),
          fetch(`${API}/leaderboard?period=1d&limit=3`),
        ]);
        const d = await statsRes.json();
        const lb = await lbRes.json();
        const queryCount = lb.total_queries ?? 0;
        document.getElementById('stats').innerHTML =
          `<span>${d.total_services.toLocaleString()}</span> services indexed · ` +
          `<span>${d.by_tier['2']}</span> Tier 2 executable today · ` +
          `<span>${queryCount}</span> searches today · ` +
          `Semantic ranking by Claude Haiku`;
        window._leaderboard = lb.leaderboard;
      } catch(e) { document.getElementById('stats').textContent = ''; }
    }

    function searchFor(q) {
      document.getElementById('query').value = q;
      search();
    }

    async function search() {
      const q = document.getElementById('query').value.trim();
      if (!q) return;

      const btn = document.getElementById('btn');
      const results = document.getElementById('results');
      btn.disabled = true;
      btn.textContent = 'Searching...';
      results.innerHTML = '<div class="loading">Ranking services with Claude Haiku...</div>';

      try {
        const r = await fetch(`${API}/search?q=${encodeURIComponent(q)}&limit=5`);
        const d = await r.json();

        if (!d.results?.length) {
          results.innerHTML = '<div class="error">No results found.</div>';
          return;
        }

        results.innerHTML = d.results.map(s => `
          <div class="result-card">
            <div class="result-header">
              <span class="result-name">${s.name}</span>
              <span class="result-score">score ${s.score}</span>
            </div>
            <div class="result-reason">${s.reason}</div>
            <div class="result-meta">
              <span class="tier-badge tier-${s.coverage_tier}">Tier ${s.coverage_tier}</span>
              <span>${s.pricing_usdc ? '$' + s.pricing_usdc + ' USDC/req' : 'Free'}</span>
              <a href="${s.endpoint_url}" target="_blank" class="result-endpoint">${s.endpoint_url}</a>
            </div>
          </div>
        `).join('');

        if (window._leaderboard?.length) {
          const top3 = window._leaderboard.slice(0, 3);
          results.innerHTML += `
            <div style="margin-top:24px;padding-top:20px;border-top:1px solid #334155;">
              <div style="font-size:12px;color:#64748B;margin-bottom:12px;text-transform:uppercase;letter-spacing:.05em;">
                Most searched today
              </div>
              ${top3.map((s, i) => `
                <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #1E293B;">
                  <span style="color:#94A3B8;font-size:13px;">${i+1}. ${s.name}</span>
                  <span style="color:#4F46E5;font-size:12px;font-weight:600;">${s.query_count} searches</span>
                </div>
              `).join('')}
            </div>`;
        }
      } catch(e) {
        results.innerHTML = `<div class="error">Error: ${e.message}</div>`;
      } finally {
        btn.disabled = false;
        btn.textContent = 'Search';
      }
    }

    loadStats();
  </script>
</body>
</html>
